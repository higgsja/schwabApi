# Schwab API Configuration
schwab:
  api:
    # Your Schwab API credentials
    client-id: "y5eXVg33MBOWWyAOkDTuNRFr35Ml1Y5p"
    client-secret: "hy9B5A0tf7KcYE1A"

    # OAuth redirect URI - must match your registered app callback URL
    redirect-uri: "http://127.0.0.1"

  # Other API endpoints
  oauth:
    auth-url: "https://api.schwabapi.com/v1/oauth/authorize"
    token-url: "https://api.schwabapi.com/v1/oauth/token"
    refresh-token-url: "https://api.schwabapi.com/v1/oauth/token"
  
  api-endpoints:
    base-url: "https://api.schwabapi.com/trader/v1"
    market-data-url: "https://api.schwabapi.com/marketdata/v1"
    accounts-url: "https://api.schwabapi.com/accounts/v1"
    orders-url: "https://api.schwabapi.com/trader/v1"
    streaming-url: "wss://api.schwabapi.com/v1/ws"

  # Token management
  token:
    token-file: "schwab-api.json"
    refresh-token-file: "schwab-refresh-token.txt"

